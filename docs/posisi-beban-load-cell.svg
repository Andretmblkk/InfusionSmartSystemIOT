<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#d62828"/>
    </marker>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e9eef2"/>
      <stop offset="0.5" stop-color="#aebbc5"/>
      <stop offset="1" stop-color="#dde4e9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="#f7fafc"/>
  <text x="600" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#102a43">
    Posisi Beban pada Load Cell Batang
  </text>

  <!-- Fixed support -->
  <rect x="90" y="420" width="300" height="115" rx="8" fill="#476582"/>
  <path d="M105 535 L135 565 M160 535 L190 565 M215 535 L245 565 M270 535 L300 565 M325 535 L355 565"
        stroke="#2f4858" stroke-width="10"/>
  <text x="240" y="595" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#183153">
    RANGKA / MEJA TETAP
  </text>

  <!-- Load cell -->
  <rect x="205" y="335" width="700" height="120" rx="22" fill="url(#metal)" stroke="#627d98" stroke-width="5"/>
  <circle cx="285" cy="395" r="28" fill="#f7fafc" stroke="#627d98" stroke-width="5"/>
  <circle cx="825" cy="395" r="28" fill="#f7fafc" stroke="#627d98" stroke-width="5"/>
  <rect x="485" y="365" width="145" height="60" rx="10" fill="#8192a0"/>
  <text x="558" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">
    BAGIAN SENSOR
  </text>

  <!-- Fixed bolts -->
  <line x1="265" y1="365" x2="265" y2="455" stroke="#23384d" stroke-width="14"/>
  <line x1="305" y1="365" x2="305" y2="455" stroke="#23384d" stroke-width="14"/>
  <circle cx="265" cy="365" r="13" fill="#23384d"/>
  <circle cx="305" cy="365" r="13" fill="#23384d"/>

  <!-- Weight -->
  <path d="M735 195 L895 195 L930 325 L700 325 Z" fill="#ffd166" stroke="#b7791f" stroke-width="5"/>
  <path d="M765 195 C765 125 865 125 865 195" fill="none" stroke="#b7791f" stroke-width="18"/>
  <text x="815" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#6b460d">
    BEBAN
  </text>
  <line x1="815" y1="100" x2="815" y2="180" stroke="#d62828" stroke-width="7" marker-end="url(#arrow)"/>
  <text x="815" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#d62828">
    TARUH BEBAN DI SINI
  </text>

  <!-- Labels -->
  <line x1="250" y1="325" x2="175" y2="215" stroke="#138a5b" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="130" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#087f5b">
    UJUNG DIKUNCI
  </text>
  <text x="130" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#087f5b">
    tidak boleh bergerak
  </text>

  <line x1="875" y1="455" x2="970" y2="525" stroke="#20639b" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="1020" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#145a8d">
    UJUNG BEBAS
  </text>
  <text x="1020" y="592" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#145a8d">
    menerima gaya beban
  </text>

  <rect x="345" y="625" width="510" height="50" rx="8" fill="#ffe3e3" stroke="#d62828" stroke-width="2"/>
  <text x="600" y="658" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#a61b1b">
    Jangan taruh beban di bagian tengah atau pada modul HX711
  </text>
</svg>
